# Runs the full AI Penetration Tester stack: FastAPI backend + React frontend.
# Usage: docker compose up --build  ->  open http://localhost:8080
services:
  backend:
    build: ./backend
    image: ai-pentester-backend
    environment:
      # Origins allowed to call the API directly (the nginx proxy is same-origin).
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:5173
      # Demo mode: restrict scanning to the bundled Juice Shop target only.
      # Set to 0 or remove for unrestricted (local/private) use.
      - DEMO_MODE=0
      # Nuclei tuning: time-box the scan and focus on fast, broadly-applicable
      # template tags so the demo stays quick. Clear NUCLEI_TAGS for a full scan.
      - NUCLEI_TIMEOUT=90
      - NUCLEI_TAGS=misconfig,misconfiguration,exposure,exposures,tech,ssl,default-login,takeover
      # OWASP ZAP daemon (internal-only service below) for active scanning.
      - ZAP_API_URL=http://zap:8090
      - ZAP_TIMEOUT=180
      # sqlmap: time-box the SQL-injection probe so the demo stays bounded.
      - SQLMAP_TIMEOUT=180
    volumes:
      # Persists the SQLite database that arrives in the next task.
      - backend-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # OWASP ZAP running as a headless daemon, reachable only on the internal
  # compose network (no host port). API key disabled since it is not exposed.
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    expose:
      - "8090"

  # Bundled vulnerable target for safe demo scanning.
  juiceshop:
    image: bkimminich/juice-shop:latest
    expose:
      - "3000"

  frontend:
    build: ./frontend
    image: ai-pentester-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
